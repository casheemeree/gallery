<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <title>Private Gallery</title>
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="preload" href="/fonts/inter-latin.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/styles.css?v=7" />
  </head>
  <body>
    <main id="gallery" class="gallery" aria-hidden="true">
      <div id="viewport" class="gallery__viewport" aria-label="Infinite image gallery">
        <div id="world" class="gallery__world"></div>
      </div>

      <button id="addButton" class="glass-button add-button" type="button" aria-label="Add image">
        <img src="/icons/add.svg?v=2" alt="" draggable="false" />
      </button>
      <input id="fileInput" class="visually-hidden" type="file" accept="image/jpeg,image/png,image/webp,image/gif" />

    </main>

    <section id="login" class="login" aria-label="Access code">
      <div class="login__glow" aria-hidden="true"></div>
      <form id="loginForm" class="code-pill glass-panel" autocomplete="off">
        <label class="visually-hidden" for="codeInput">10 digit access code</label>
        <input
          id="codeInput"
          name="code"
          type="password"
          inputmode="numeric"
          pattern="[0-9]{10}"
          maxlength="10"
          placeholder="INPUT CODE"
          required
        />
        <button id="goButton" class="go-button" type="submit" aria-label="Enter gallery">
          <img src="/icons/go.svg" alt="" draggable="false" />
        </button>
      </form>
    </section>

    <dialog id="preview" class="preview">
      <div class="preview__backdrop"></div>
      <div class="preview__content">
        <figure class="preview__figure">
          <img id="previewImage" alt="" />
        </figure>
        <div class="preview__actions">
          <button id="closePreview" class="glass-button preview__action preview__close" type="button">
            Close
          </button>
          <button
            id="deleteImage"
            class="glass-button preview__action preview__delete"
            type="button"
            aria-label="Hold for 2 seconds to delete image"
          >
            <span class="preview__delete-progress" aria-hidden="true"></span>
            <span id="deleteLabel" class="preview__delete-label">Delete</span>
          </button>
        </div>
      </div>
    </dialog>

    <div id="toast" class="toast glass-panel" role="status" aria-live="polite"></div>
    <script type="module" src="/app.js?v=11"></script>
  </body>
</html>
